<!DOCTYPE html>
<html>
<head>
  <title>Validação de Sócio</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body>

<h1 id="status">A validar...</h1>
<p id="nome"></p>
<p id="numero"></p>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');

  // Firebase config (vais meter a tua)
  const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  db.collection("socios").doc(id).get().then(doc => {
    if (doc.exists) {
      const data = doc.data();

      document.getElementById("nome").innerText = data.nome;
      document.getElementById("numero").innerText = "Nº " + data.numero;

      if (data.estado === "ativo") {
        document.getElementById("status").innerText = "✅ Sócio Ativo";
      } else {
        document.getElementById("status").innerText = "❌ Sócio Inativo";
      }
    } else {
      document.getElementById("status").innerText = "Sócio não encontrado";
    }
  });
</script>

</body>
</html>
