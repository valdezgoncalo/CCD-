<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Validação CCD</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h1 id="status">A validar...</h1>
<h2 id="nome"></h2>
<p id="numero"></p>

<script>
  const socios = [
    {
      id: "abc123",
      nome: "Gonçalo Valdez",
      numero: "1",
      estado: "ativo"
    },
    {
      id: "xyz456",
      nome: "João Silva",
      numero: "2",
      estado: "inativo"
    }
    {
  id: "novo789",
  nome: "Maria Costa",
  numero: "3",
  estado: "ativo"
}
  {
  id: "novo789",
  nome: "cÁTIA",
  numero: "3",
  estado: "ativo"
}
  ];

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const socio = socios.find(s => s.id === id);

  if (!socio) {
    document.getElementById("status").innerText = "❌ Sócio não encontrado";
  } else {
    document.getElementById("nome").innerText = socio.nome;
    document.getElementById("numero").innerText = "Nº " + socio.numero;

    if (socio.estado === "ativo") {
      document.getElementById("status").innerText = "✅ Sócio Ativo";
      document.body.style.backgroundColor = "#d4edda";
    } else {
      document.getElementById("status").innerText = "❌ Sócio Inativo";
      document.body.style.backgroundColor = "#f8d7da";
    }
  }
</script>

</body>
</html>
